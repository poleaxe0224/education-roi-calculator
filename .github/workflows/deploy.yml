name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Fetch BLS wage data
        run: node scripts/fetch-bls-wages.mjs
      - name: Fetch Scorecard tuition data
        run: node scripts/fetch-scorecard-tuition.mjs
        env:
          SCORECARD_API_KEY: ${{ secrets.SCORECARD_API_KEY }}
      - name: Fetch IPEDS data (graduation rates + completions)
        run: node scripts/fetch-ipeds-data.mjs
        env:
          SCORECARD_API_KEY: ${{ secrets.SCORECARD_API_KEY }}
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
